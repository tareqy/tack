name: Kanban
options:
  bundleIdPrefix: com.tareq
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    GENERATE_INFOPLIST_FILE: YES
targets:
  Kanban:
    type: application
    platform: macOS
    sources: [Kanban]
    entitlements:
      path: Kanban/Kanban.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: Kanban/Info.plist
      properties:
        CFBundleDisplayName: Kanban
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.tareq.kanban.card
            UTTypeConformsTo: [public.data]
            UTTypeDescription: Kanban Card
          - UTTypeIdentifier: com.tareq.kanban.list
            UTTypeConformsTo: [public.data]
            UTTypeDescription: Kanban List
  KanbanTests:
    type: bundle.unit-test
    platform: macOS
    sources: [KanbanTests]
    dependencies:
      - target: Kanban
  KanbanUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - KanbanUITests
      - Kanban/Support/AccessibilityID.swift
    dependencies:
      - target: Kanban
schemes:
  Kanban:
    build:
      targets:
        Kanban: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [KanbanTests, KanbanUITests]
