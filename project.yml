name: Tack
options:
  bundleIdPrefix: com.tareq
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    GENERATE_INFOPLIST_FILE: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  Tack:
    type: application
    platform: macOS
    sources: [Tack]
    settings:
      base:
        # Single source of truth for the app version: with GENERATE_INFOPLIST_FILE=YES, Xcode
        # derives CFBundleShortVersionString/CFBundleVersion from these settings and STRIPS any
        # literal plist values (verified: without these, built apps carried no version keys at all).
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "4"
    entitlements:
      path: Tack/Tack.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    info:
      path: Tack/Info.plist
      properties:
        CFBundleDisplayName: Tack
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.tareq.tack.card
            UTTypeConformsTo: [public.data]
            UTTypeDescription: Tack Card
          - UTTypeIdentifier: com.tareq.tack.list
            UTTypeConformsTo: [public.data]
            UTTypeDescription: Tack List
  TackTests:
    type: bundle.unit-test
    platform: macOS
    sources: [TackTests]
    dependencies:
      - target: Tack
  TackUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - TackUITests
      - Tack/Support/AccessibilityID.swift
    dependencies:
      - target: Tack
schemes:
  Tack:
    build:
      targets:
        Tack: all
    run:
      config: Debug
    test:
      config: Debug
      targets: [TackTests, TackUITests]
